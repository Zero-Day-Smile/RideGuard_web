services:
  - type: web
    name: rideguard-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./rideguard.db
      - key: CORS_ORIGINS
        value: https://rideguard-web.onrender.com

  - type: static
    name: rideguard-web
    rootDir: dashboard
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://rideguard-api.onrender.com
